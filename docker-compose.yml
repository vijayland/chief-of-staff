services:

  # ── Infrastructure ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agentic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: docker/Dockerfile
    container_name: agentic_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./api
      dockerfile: docker/Dockerfile.worker
    container_name: agentic_worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: celery -A app.workers.celery_app worker --loglevel=info -Q default,email_sync,memory

  # ── Frontend ──────────────────────────────────────────────────────────────
  web:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agentic_web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./agent/src:/app/src
      - ./agent/public:/app/public

volumes:
  redis_data:
