name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  APP_NAME: chief-of-staff

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Frontend lint & type check  (no secrets needed)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test-web:
    name: "Web — lint & type check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Backend lint & tests  (no Docker, no AWS — fast feedback)
# ─────────────────────────────────────────────────────────────────────────────
  test-api:
    name: "API — lint & unit tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentic_test
          POSTGRES_USER: agentic
          POSTGRES_PASSWORD: agentic_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system ruff pytest pytest-asyncio pytest-cov

      - name: Lint (ruff)
        run: ruff check app/

      - name: Run tests
        run: pytest --no-cov -x -q
        env:
          APP_ENV: test
          SECRET_KEY: ci-test-secret-key-not-real
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TEST_DATABASE_URL: postgresql+asyncpg://agentic:agentic_secret@localhost:5432/agentic_test
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          MEMORY_EMBEDDING_DIM: "1536"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Terraform (creates ECR + all AWS infrastructure)
#          Must run BEFORE build-push so ECR exists
# ─────────────────────────────────────────────────────────────────────────────
  terraform:
    name: "Terraform — provision infrastructure"
    needs: [test-web, test-api]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    outputs:
      s3_bucket:     ${{ steps.outputs.outputs.s3_bucket }}
      cf_id:         ${{ steps.outputs.outputs.cf_id }}
      lambda_bucket: ${{ steps.outputs.outputs.lambda_bucket }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -out=tfplan
        env:
          TF_VAR_database_url:         ${{ secrets.DATABASE_URL }}
          TF_VAR_secret_key:           ${{ secrets.SECRET_KEY }}
          TF_VAR_openai_api_key:       ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_encryption_key:       ${{ secrets.ENCRYPTION_KEY }}
          TF_VAR_google_client_id:     ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_redis_url:             ${{ secrets.REDIS_URL }}
          TF_VAR_celery_broker_url:     ${{ secrets.CELERY_BROKER_URL }}
          TF_VAR_celery_result_backend: ${{ secrets.CELERY_RESULT_BACKEND }}
          TF_VAR_api_image_tag:         ${{ github.sha }}

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Read Terraform outputs
        id: outputs
        working-directory: terraform
        run: |
          echo "s3_bucket=$(terraform output -raw web_s3_bucket)"                  >> $GITHUB_OUTPUT
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)"         >> $GITHUB_OUTPUT
          echo "lambda_bucket=$(terraform output -raw lambda_code_bucket)"         >> $GITHUB_OUTPUT

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Docker build → test inside container → push to ECR
#          ECR is guaranteed to exist because terraform job ran first
# ─────────────────────────────────────────────────────────────────────────────
  build-push:
    name: "Docker — build → test → push ECR"
    needs: [terraform]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR image tags
        id: meta
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REPO="${ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}-api"
          echo "image_tag=${REPO}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "image_latest=${REPO}:latest"          >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally (do NOT push yet)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/docker/Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests inside Docker image
        run: |
          docker run --rm \
            -e APP_ENV=test \
            -e SECRET_KEY=ci-test-secret-key-not-real \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
            -e GOOGLE_CLIENT_ID=dummy \
            -e GOOGLE_CLIENT_SECRET=dummy \
            -e MEMORY_EMBEDDING_DIM=1536 \
            ${{ steps.meta.outputs.image_tag }} \
            pytest --no-cov -x -q

      - name: Push verified image to ECR
        run: |
          docker push ${{ steps.meta.outputs.image_tag }}
          docker push ${{ steps.meta.outputs.image_latest }}
          echo "✅ Pushed ${{ steps.meta.outputs.image_tag }}"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — Deploy: ECS + Frontend (S3/CloudFront) + Lambda
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy — ECS + S3 + Lambda"
    needs: [build-push, terraform]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── ECS — roll out new Docker image ──────────────────────────────────────
      - name: Deploy to ECS Fargate
        run: |
          aws ecs update-service \
            --cluster ${{ env.APP_NAME }}-cluster \
            --service ${{ env.APP_NAME }}-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "✅ ECS rolling deployment triggered"

      # ── Frontend — build Next.js static export ────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Install frontend dependencies
        working-directory: agent
        run: npm ci

      - name: Build Next.js static export
        working-directory: agent
        run: npm run build

      - name: Sync frontend to S3
        run: |
          S3=${{ needs.terraform.outputs.s3_bucket }}

          # Upload everything first (no delete yet)
          aws s3 sync agent/out s3://$S3 \
            --cache-control "public,max-age=31536000,immutable"

          # Override HTML files with no-cache headers
          aws s3 sync agent/out s3://$S3 \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --metadata-directive REPLACE

          # Now delete files removed from build (single pass)
          aws s3 sync agent/out s3://$S3 --delete --size-only

          echo "✅ Frontend synced to S3"

      - name: Invalidate CloudFront cache
        run: |
          ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform.outputs.cf_id }} \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          echo "✅ CloudFront invalidation: $ID"

      # ── Lambda — package & deploy ─────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Package Lambda functions
        run: |
          pip install uv --quiet

          # Install all api dependencies into /tmp/lambda-pkg
          cd api
          pip install \
            $(uv export --no-dev --format requirements-txt 2>/dev/null | grep -v "^-e") \
            --target /tmp/lambda-pkg \
            --quiet

          # Copy application code
          cp -r app     /tmp/lambda-pkg/app
          cp -r lambdas /tmp/lambda-pkg/lambdas

          # Create one zip per Lambda handler
          cd /tmp/lambda-pkg
          zip -r /tmp/email_sync.zip           . -x "*.pyc" "__pycache__/*" > /dev/null
          zip -r /tmp/calendar_sync.zip        . -x "*.pyc" "__pycache__/*" > /dev/null
          zip -r /tmp/memory_consolidation.zip . -x "*.pyc" "__pycache__/*" > /dev/null
          echo "✅ Lambda packages created"

      - name: Upload Lambda zips to S3
        run: |
          LB=${{ needs.terraform.outputs.lambda_bucket }}
          aws s3 cp /tmp/email_sync.zip           s3://$LB/email_sync.zip
          aws s3 cp /tmp/calendar_sync.zip        s3://$LB/calendar_sync.zip
          aws s3 cp /tmp/memory_consolidation.zip s3://$LB/memory_consolidation.zip
          echo "✅ Lambda zips uploaded"

      - name: Update Lambda function code
        run: |
          LB=${{ needs.terraform.outputs.lambda_bucket }}

          for fn in email-sync calendar-sync memory-consolidation; do
            key="${fn//-/_}.zip"
            aws lambda update-function-code \
              --function-name ${{ env.APP_NAME }}-${fn} \
              --s3-bucket $LB \
              --s3-key ${key} \
              --no-cli-pager
            echo "✅ Updated Lambda: ${{ env.APP_NAME }}-${fn}"
          done

      # ── Deployment summary ────────────────────────────────────────────────────
      - name: Write deployment summary
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ECS Fargate  | Rolling deploy triggered |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker image | \`${{ github.sha }}\` pushed to ECR |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend     | S3 synced + CloudFront invalidated |" >> $GITHUB_STEP_SUMMARY
          echo "| Lambda (3x)  | email / calendar / memory updated |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\` by @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
