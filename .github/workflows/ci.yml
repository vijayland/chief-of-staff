name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test-web:
    name: "Web — lint, types & build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  test-api:
    name: "API — lint & tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentic_test
          POSTGRES_USER: agentic
          POSTGRES_PASSWORD: agentic_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system ruff pytest pytest-asyncio pytest-cov

      - run: ruff check app/

      - name: Tests
        run: pytest --no-cov -x -q
        env:
          APP_ENV: test
          SECRET_KEY: ci-test-secret-key-not-real
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TEST_DATABASE_URL: postgresql+asyncpg://agentic:agentic_secret@localhost:5432/agentic_test
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          MEMORY_EMBEDDING_DIM: "1536"
