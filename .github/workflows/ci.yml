name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  APP_NAME: chief-of-staff

jobs:
  # ── 1. Frontend lint & type check ────────────────────────────────────────────
  test-web:
    name: Web — lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  # ── 2. Build Docker image → run tests inside it → push to ECR ───────────────
  build-api:
    name: API — docker build → test → push ECR
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      image: ${{ steps.meta.outputs.image }}   # passed to deploy job

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}-api"
          echo "image_tag=${IMAGE}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "image_latest=${IMAGE}:latest" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image but DO NOT push yet — load into local Docker daemon for testing
      - name: Build Docker image (local)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/docker/Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run pytest INSIDE the built image — same environment as production
      - name: Run tests inside Docker image
        run: |
          docker run --rm \
            -e APP_ENV=test \
            -e SECRET_KEY=ci-test-secret \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }} \
            -e GOOGLE_CLIENT_ID=dummy \
            -e GOOGLE_CLIENT_SECRET=dummy \
            -e MEMORY_EMBEDDING_DIM=1536 \
            ${{ steps.meta.outputs.image_tag }} \
            pytest --no-cov -x -q

      # Tests passed → push the exact same image to ECR
      - name: Push image to ECR
        run: |
          docker push ${{ steps.meta.outputs.image_tag }}
          docker push ${{ steps.meta.outputs.image_latest }}

  # ── 3. Deploy (only on push to main) ─────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    needs: [test-web, build-api]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Terraform ─────────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_database_url:         ${{ secrets.DATABASE_URL }}
          TF_VAR_secret_key:           ${{ secrets.SECRET_KEY }}
          TF_VAR_openai_api_key:       ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_encryption_key:       ${{ secrets.ENCRYPTION_KEY }}
          TF_VAR_google_client_id:     ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_api_image_tag:        ${{ github.sha }}

      # ── ECS deploy — uses image already in ECR from build-api job ─────────────
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.APP_NAME }}-cluster \
            --service ${{ env.APP_NAME }}-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      # ── Frontend → S3 → CloudFront ────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Build frontend
        working-directory: agent
        run: |
          npm ci
          npm run build

      - name: Get S3 bucket & CloudFront ID from Terraform
        id: tf
        working-directory: terraform
        run: |
          echo "s3_bucket=$(terraform output -raw web_s3_bucket)"     >> $GITHUB_OUTPUT
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "lambda_bucket=$(terraform output -raw lambda_code_bucket)" >> $GITHUB_OUTPUT

      - name: Upload frontend to S3
        run: |
          aws s3 sync agent/out s3://${{ steps.tf.outputs.s3_bucket }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html"
          aws s3 sync agent/out s3://${{ steps.tf.outputs.s3_bucket }} \
            --delete \
            --cache-control "no-cache" \
            --include "*.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.cf_id }} \
            --paths "/*"

      # ── Lambda functions ──────────────────────────────────────────────────────
      - name: Package Lambda functions
        run: |
          pip install uv --quiet
          cd api
          uv pip install --system -r <(uv pip compile pyproject.toml --output-file -) \
            --target /tmp/lambda-pkg --quiet
          cp -r app /tmp/lambda-pkg/app
          cp -r lambdas /tmp/lambda-pkg/lambdas
          cd /tmp/lambda-pkg
          zip -r /tmp/email_sync.zip          . -x "*.pyc" -x "__pycache__/*"
          zip -r /tmp/calendar_sync.zip       . -x "*.pyc" -x "__pycache__/*"
          zip -r /tmp/memory_consolidation.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Upload Lambda packages to S3
        run: |
          aws s3 cp /tmp/email_sync.zip          s3://${{ steps.tf.outputs.lambda_bucket }}/email_sync.zip
          aws s3 cp /tmp/calendar_sync.zip       s3://${{ steps.tf.outputs.lambda_bucket }}/calendar_sync.zip
          aws s3 cp /tmp/memory_consolidation.zip s3://${{ steps.tf.outputs.lambda_bucket }}/memory_consolidation.zip

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-email-sync \
            --s3-bucket ${{ steps.tf.outputs.lambda_bucket }} \
            --s3-key email_sync.zip

          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-calendar-sync \
            --s3-bucket ${{ steps.tf.outputs.lambda_bucket }} \
            --s3-key calendar_sync.zip

          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-memory-consolidation \
            --s3-bucket ${{ steps.tf.outputs.lambda_bucket }} \
            --s3-key memory_consolidation.zip

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "### Deployment complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API image | \`${{ github.sha }}\` — built, tested, pushed to ECR |" >> $GITHUB_STEP_SUMMARY
          echo "| ECS Fargate | Force-deployed new task |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | S3 synced + CloudFront invalidated |" >> $GITHUB_STEP_SUMMARY
          echo "| Lambda | All 3 functions updated |" >> $GITHUB_STEP_SUMMARY
