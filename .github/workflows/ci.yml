name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  APP_NAME: chief-of-staff

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Frontend lint & type check  (no secrets needed)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test-web:
    name: "Web — lint & type check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Backend tests  (no Docker, no AWS — fast feedback)
# ─────────────────────────────────────────────────────────────────────────────
  test-api:
    name: "API — lint & unit tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app/

      - name: Run tests
        run: pytest --no-cov -x -q
        env:
          APP_ENV: test
          SECRET_KEY: ci-test-secret-key-not-real
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          MEMORY_EMBEDDING_DIM: "1536"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Docker build → test inside container → push to ECR
#          Runs only on push to main (not PRs)
# ─────────────────────────────────────────────────────────────────────────────
  build-push:
    name: "Docker — build → test → push ECR"
    needs: [test-web, test-api]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR image tags
        id: meta
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REPO="${ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}-api"
          echo "image_tag=${REPO}:${{ github.sha }}"   >> $GITHUB_OUTPUT
          echo "image_latest=${REPO}:latest"            >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally — do NOT push yet)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/docker/Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests inside Docker image
        run: |
          docker run --rm \
            -e APP_ENV=test \
            -e SECRET_KEY=ci-test-secret-key-not-real \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
            -e GOOGLE_CLIENT_ID=dummy \
            -e GOOGLE_CLIENT_SECRET=dummy \
            -e MEMORY_EMBEDDING_DIM=1536 \
            ${{ steps.meta.outputs.image_tag }} \
            pytest --no-cov -x -q

      - name: Push image to ECR (tests passed)
        run: |
          docker push ${{ steps.meta.outputs.image_tag }}
          docker push ${{ steps.meta.outputs.image_latest }}
          echo "✅ Pushed ${{ steps.meta.outputs.image_tag }}"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Deploy everything to AWS
#          Runs only after build-push succeeds
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to AWS"
    needs: [build-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Terraform ────────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -out=tfplan
        env:
          TF_VAR_database_url:         ${{ secrets.DATABASE_URL }}
          TF_VAR_secret_key:           ${{ secrets.SECRET_KEY }}
          TF_VAR_openai_api_key:       ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_encryption_key:       ${{ secrets.ENCRYPTION_KEY }}
          TF_VAR_google_client_id:     ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_api_image_tag:        ${{ github.sha }}

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          echo "s3_bucket=$(terraform output -raw web_s3_bucket)"              >> $GITHUB_OUTPUT
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)"     >> $GITHUB_OUTPUT
          echo "lambda_bucket=$(terraform output -raw lambda_code_bucket)"     >> $GITHUB_OUTPUT

      # ── ECS — force new deployment ───────────────────────────────────────────
      - name: Deploy new image to ECS Fargate
        run: |
          aws ecs update-service \
            --cluster ${{ env.APP_NAME }}-cluster \
            --service ${{ env.APP_NAME }}-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "✅ ECS deployment triggered"

      # ── Frontend — build & upload ────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Install frontend dependencies
        working-directory: agent
        run: npm ci

      - name: Build Next.js static export
        working-directory: agent
        run: npm run build

      - name: Upload frontend to S3
        run: |
          # JS/CSS — immutable cache (filenames are content-hashed by Next.js)
          aws s3 sync agent/out s3://${{ steps.tf.outputs.s3_bucket }} \
            --delete \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"

          # HTML — always revalidate
          aws s3 sync agent/out s3://${{ steps.tf.outputs.s3_bucket }} \
            --delete \
            --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate"

          echo "✅ Frontend uploaded to S3"

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.cf_id }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "✅ CloudFront invalidation started: $INVALIDATION_ID"

      # ── Lambda — package & deploy ────────────────────────────────────────────
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Package Lambda functions
        run: |
          cd api
          uv pip install \
            --system \
            -r <(uv pip compile pyproject.toml --output-file -) \
            --target /tmp/lambda-pkg \
            --quiet

          cp -r app      /tmp/lambda-pkg/app
          cp -r lambdas  /tmp/lambda-pkg/lambdas

          cd /tmp/lambda-pkg
          zip -r /tmp/email_sync.zip           . -x "*.pyc" -x "__pycache__/*" > /dev/null
          zip -r /tmp/calendar_sync.zip        . -x "*.pyc" -x "__pycache__/*" > /dev/null
          zip -r /tmp/memory_consolidation.zip . -x "*.pyc" -x "__pycache__/*" > /dev/null
          echo "✅ Lambda packages created"

      - name: Upload Lambda zips to S3
        run: |
          aws s3 cp /tmp/email_sync.zip           s3://${{ steps.tf.outputs.lambda_bucket }}/email_sync.zip
          aws s3 cp /tmp/calendar_sync.zip        s3://${{ steps.tf.outputs.lambda_bucket }}/calendar_sync.zip
          aws s3 cp /tmp/memory_consolidation.zip s3://${{ steps.tf.outputs.lambda_bucket }}/memory_consolidation.zip
          echo "✅ Lambda zips uploaded"

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-email-sync \
            --s3-bucket ${{ steps.tf.outputs.lambda_bucket }} \
            --s3-key email_sync.zip \
            --no-cli-pager

          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-calendar-sync \
            --s3-bucket ${{ steps.tf.outputs.lambda_bucket }} \
            --s3-key calendar_sync.zip \
            --no-cli-pager

          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-memory-consolidation \
            --s3-bucket ${{ steps.tf.outputs.lambda_bucket }} \
            --s3-key memory_consolidation.zip \
            --no-cli-pager

          echo "✅ All Lambda functions updated"

      # ── Job summary ──────────────────────────────────────────────────────────
      - name: Write deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker image | ✅ Pushed | \`${{ github.sha }}\` → ECR |" >> $GITHUB_STEP_SUMMARY
          echo "| ECS Fargate  | ✅ Deployed | Force new deployment triggered |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend     | ✅ Live | S3 synced + CloudFront invalidated |" >> $GITHUB_STEP_SUMMARY
          echo "| Lambda (3x)  | ✅ Updated | email / calendar / memory |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
