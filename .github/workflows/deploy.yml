name: Deploy

on:
  # Auto-deploy only after CI tests pass on main
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  # Manual deploy — skips the CI gate (use when you know tests pass)
  workflow_dispatch:
    inputs:
      force_backend:
        description: "Force build & deploy backend"
        type: boolean
        default: false
      force_frontend:
        description: "Force deploy frontend"
        type: boolean
        default: false
      force_lambda:
        description: "Force deploy lambdas"
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  APP_NAME: chief-of-staff

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# Detect changed paths
# ─────────────────────────────────────────────────────────────────────────────
  changes:
    name: "Detect changed paths"
    runs-on: ubuntu-latest
    # For auto-deploys: only proceed if CI tests passed
    # For manual deploys (workflow_dispatch): always proceed
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      api:      ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      lambda:   ${{ steps.filter.outputs.lambda }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            frontend:
              - 'agent/**'
            lambda:
              - 'api/lambdas/**'
              - 'api/lambda-requirements.txt'

# ─────────────────────────────────────────────────────────────────────────────
# Terraform — always runs on main (push or manual trigger)
# ─────────────────────────────────────────────────────────────────────────────
  terraform:
    name: "Terraform — provision infrastructure"
    needs: [changes]
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      s3_bucket:     ${{ steps.outputs.outputs.s3_bucket }}
      cf_id:         ${{ steps.outputs.outputs.cf_id }}
      lambda_bucket: ${{ steps.outputs.outputs.lambda_bucket }}
      api_url:       ${{ steps.outputs.outputs.api_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -out=tfplan
        env:
          TF_VAR_database_url:          ${{ secrets.DATABASE_URL }}
          TF_VAR_secret_key:            ${{ secrets.SECRET_KEY }}
          TF_VAR_openai_api_key:        ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_encryption_key:        ${{ secrets.ENCRYPTION_KEY }}
          TF_VAR_google_client_id:      ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_redis_url:             ${{ secrets.REDIS_URL }}
          TF_VAR_celery_broker_url:     ${{ secrets.CELERY_BROKER_URL }}
          TF_VAR_celery_result_backend: ${{ secrets.CELERY_RESULT_BACKEND }}
          TF_VAR_api_image_tag:         ${{ github.sha }}

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Read outputs
        id: outputs
        working-directory: terraform
        run: |
          echo "s3_bucket=$(terraform output -raw web_s3_bucket)"          >> $GITHUB_OUTPUT
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "lambda_bucket=$(terraform output -raw lambda_code_bucket)" >> $GITHUB_OUTPUT
          echo "api_url=$(terraform output -raw api_url)"                  >> $GITHUB_OUTPUT

# ─────────────────────────────────────────────────────────────────────────────
# Docker build → push ECR
# Runs when: api/ changed  OR  force_backend=true
# ─────────────────────────────────────────────────────────────────────────────
  build-push:
    name: "Docker — build & push ECR"
    needs: [terraform, changes]
    runs-on: ubuntu-latest
    if: |
      needs.changes.outputs.api == 'true' ||
      inputs.force_backend == true

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR image tags
        id: meta
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REPO="${ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}-api"
          echo "image_tag=${REPO}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "image_latest=${REPO}:latest"          >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# Deploy ECS — runs only after a successful Docker build
# ─────────────────────────────────────────────────────────────────────────────
  deploy-ecs:
    name: "Deploy — ECS Fargate"
    needs: [build-push]
    runs-on: ubuntu-latest
    if: needs.build-push.result == 'success'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.APP_NAME }}-cluster \
            --service ${{ env.APP_NAME }}-api \
            --force-new-deployment \
            --no-cli-pager
          echo "ECS redeployed"

# ─────────────────────────────────────────────────────────────────────────────
# Deploy Frontend — S3 + CloudFront
# Runs when: agent/ changed  OR  force_frontend=true
# ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: "Deploy — Frontend (S3 + CloudFront)"
    needs: [terraform, changes]
    runs-on: ubuntu-latest
    if: |
      needs.changes.outputs.frontend == 'true' ||
      inputs.force_frontend == true

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Install & build
        working-directory: agent
        env:
          NEXT_PUBLIC_API_URL: ${{ needs.terraform.outputs.api_url }}
        run: npm ci && npm run build

      - name: Sync to S3
        run: |
          S3=${{ needs.terraform.outputs.s3_bucket }}
          aws s3 sync agent/out s3://$S3 \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 sync agent/out s3://$S3 \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --metadata-directive REPLACE
          aws s3 sync agent/out s3://$S3 --delete --size-only

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform.outputs.cf_id }} \
            --paths "/*" --query 'Invalidation.Id' --output text

# ─────────────────────────────────────────────────────────────────────────────
# Deploy Lambda
# Runs when: api/lambdas/ changed  OR  force_lambda=true
# ─────────────────────────────────────────────────────────────────────────────
  deploy-lambda:
    name: "Deploy — Lambda functions"
    needs: [terraform, changes]
    runs-on: ubuntu-latest
    if: |
      needs.changes.outputs.lambda == 'true' ||
      inputs.force_lambda == true

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Package Lambda functions
        run: |
          cd api
          pip install -r lambda-requirements.txt --target /tmp/lambda-pkg --quiet
          cp -r app     /tmp/lambda-pkg/app
          cp -r lambdas /tmp/lambda-pkg/lambdas
          cd /tmp/lambda-pkg
          zip -r /tmp/email_sync.zip           . -x "*.pyc" "__pycache__/*" > /dev/null
          zip -r /tmp/calendar_sync.zip        . -x "*.pyc" "__pycache__/*" > /dev/null
          zip -r /tmp/memory_consolidation.zip . -x "*.pyc" "__pycache__/*" > /dev/null

      - name: Upload & update Lambda functions
        run: |
          LB=${{ needs.terraform.outputs.lambda_bucket }}
          aws s3 cp /tmp/email_sync.zip           s3://$LB/email_sync.zip
          aws s3 cp /tmp/calendar_sync.zip        s3://$LB/calendar_sync.zip
          aws s3 cp /tmp/memory_consolidation.zip s3://$LB/memory_consolidation.zip

          for fn in email-sync calendar-sync memory-consolidation; do
            aws lambda update-function-code \
              --function-name ${{ env.APP_NAME }}-${fn} \
              --s3-bucket $LB \
              --s3-key ${fn//-/_}.zip \
              --no-cli-pager
          done
